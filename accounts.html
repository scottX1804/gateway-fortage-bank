<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Gateway Fortage Bank</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="container-fluid">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Gateway Bank</h2>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </div>
            
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="accounts.html" class="active">💳 Accounts</a></li>
                <li><a href="transfers.html">💰 Transfers</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
                <li><a href="settings.html">⚙️ Settings</a></li>
                <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1>My Accounts</h1>
            </header>

            <div class="dashboard-grid">
                <div class="card balance-card">
                    <div class="card-header">
                        <h2>Account Balance</h2>
                    </div>
                    <div id="accountInfo"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay"></div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            await loadAccountInfo();
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        });

        async function loadAccountInfo() {
            showLoading();
            try {
                const account = await accountAPI.getDetails();
                const info = `
                    <div class="balance-display">
                        <p class="balance-label">Current Balance</p>
                        <p class="balance-amount">${formatCurrency(account.balance)}</p>
                        <div style="margin-top: 20px;">
                            <p><strong>Account Number:</strong> ${account.accountNumber}</p>
                            <p><strong>Account Type:</strong> ${account.accountType}</p>
                            <p><strong>Member Since:</strong> ${formatDate(account.createdAt)}</p>
                        </div>
                    </div>
                `;
                document.getElementById('accountInfo').innerHTML = info;
            } catch (error) {
                alert('Error loading account info: ' + error.message);
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
</html>
